{{- if .Values.networkPolicies.enabled }}
---
# Default deny all ingress traffic in the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    {{- include "astronova.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow ingress traffic to the backend only from the frontend pods
# and from the ingress controller namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: astronova-backend-netpol
  labels:
    {{- include "astronova.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronova.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from frontend pods
    - from:
        - podSelector:
            matchLabels:
              {{- include "astronova.frontend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
    # Allow traffic from the ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000

---
# Allow ingress traffic to the frontend only from the ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: astronova-frontend-netpol
  labels:
    {{- include "astronova.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "astronova.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic only from the ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
{{- end }}
