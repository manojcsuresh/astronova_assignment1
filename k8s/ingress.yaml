apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: astronova-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - astronova.example.com
      secretName: astronova-tls
  rules:
    - host: astronova.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: astronova-backend
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: astronova-backend
                port:
                  number: 8000
          - path: /docs
            pathType: Exact
            backend:
              service:
                name: astronova-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: astronova-frontend
                port:
                  number: 80
